<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>legal-cases | ملفات الدعاوى</title>
    <meta
      name="description"
      content="إدارة ملفات الدعاوى القانونية — legal-cases"
    />
    <style>
      .hidden { display: none !important; }
    </style>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="folders-view">
        <header class="topbar">
          <p class="eyebrow">legal-cases</p>
          <h1>ملفات الدعاوى</h1>
          <p class="subtitle">
            كل مربع يمثل ملف شخص لديه دعوى. اضغط على الملف لفتح التصنيفات.
          </p>
        </header>
        <div id="folders-grid" class="grid grid-folders">
          <article class="card folder-accent-1">
            <button class="card-button" type="button" data-folder-slug="patrick-sayf">
              <div class="folder-icon">📁</div>
              <h2>باتريك سيف</h2>
              <p>دعوى مع الخصم</p>
              <span class="badge">ملف ١</span>
            </button>
          </article>
          <article class="card folder-accent-2">
            <button class="card-button" type="button" data-folder-slug="folder-2">
              <div class="folder-icon">📁</div>
              <h2>ملف ٢</h2>
              <p>دعوى مع الخصم</p>
              <span class="badge">ملف ٢</span>
            </button>
          </article>
          <article class="card folder-accent-3">
            <button class="card-button" type="button" data-folder-slug="folder-3">
              <div class="folder-icon">📁</div>
              <h2>ملف ٣</h2>
              <p>دعوى مع الخصم</p>
              <span class="badge">ملف ٣</span>
            </button>
          </article>
          <article class="card folder-accent-4">
            <button class="card-button" type="button" data-folder-slug="folder-4">
              <div class="folder-icon">📁</div>
              <h2>ملف ٤</h2>
              <p>دعوى مع الخصم</p>
              <span class="badge">ملف ٤</span>
            </button>
          </article>
        </div>
        <p id="folders-status" class="status"></p>
      </section>

      <section id="categories-view" class="hidden">
        <button id="back-to-folders" class="back-btn" type="button">→ العودة إلى الملفات</button>
        <header class="topbar">
          <p class="eyebrow">تصنيفات الملف</p>
          <h1 id="categories-title"></h1>
          <p id="categories-subtitle" class="subtitle"></p>
        </header>
        <div id="categories-grid" class="grid grid-categories"></div>
      </section>

      <section id="category-detail-view" class="hidden">
        <button id="back-to-categories" class="back-btn" type="button">→ العودة إلى التصنيفات</button>
        <article class="detail-panel">
          <h2 id="category-detail-title"></h2>
          <p id="category-detail-subtitle" class="subtitle"></p>

          <div id="complaint-section" class="complaint-section hidden">
            <label for="complaint-body">نص الشكوى</label>
            <textarea id="complaint-body" placeholder="اكتب نص الشكوى هنا..."></textarea>
            <div class="actions">
              <button id="save-complaint" class="primary-btn" type="button">حفظ الشكوى</button>
              <button id="clear-complaint" class="secondary-btn" type="button">مسح النص</button>
            </div>
          </div>

          <div class="upload-section">
            <div class="upload-header">
              <h3 class="section-title">رفع الملفات</h3>
              <button id="refresh-files" class="secondary-btn" type="button">تحديث القائمة</button>
            </div>
            <p class="upload-hint">جميع الصيغ مدعومة: PDF، Word، صور، فيديو، ZIP، وغيرها.</p>
            <label class="upload-dropzone" for="file-upload-input">
              <input id="file-upload-input" type="file" multiple />
              <span class="upload-dropzone-title">اضغط أو اسحب الملفات هنا</span>
              <span class="upload-dropzone-subtitle">يمكنك اختيار أكثر من ملف في المرة الواحدة</span>
            </label>
            <ul id="file-list" class="file-list"></ul>
          </div>

          <p id="category-detail-status" class="status"></p>
        </article>
      </section>
    </main>

    <script src="/config.js"></script>
    <script src="/app.js" defer></script>
  </body>
</html>
